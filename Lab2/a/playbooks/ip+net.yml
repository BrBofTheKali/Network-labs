---
- name: SET IP+NET
  hosts: EDGE-SARATOV
  gather_facts: no #always!
  vars:
    neighbor: CORE-SARATOV
  pre_tasks:
  - name: Get timestamp
    ansible.builtin.shell: "date +%Y-%m-%d_%H:%M:%S"
    delegate_to: localhost
    register: ts
    changed_when: false

  - name: Get IPv4
    ansible.builtin.shell: |
      awk -F'|' '/{{ inventory_hostname }}/&&/{{ neighbor }}/{gsub(/ /,"",$5); print $5; exit}' /root/github/Network-labs/Lab2/IPAM.md
    delegate_to: localhost
    register: v4
    changed_when: false

  - name: Get IPv6
    ansible.builtin.shell: |
      awk -F'|' '/{{ inventory_hostname }}/&&/{{ neighbor }}/{gsub(/ /,"",$6); print $6; exit}' /root/github/Network-labs/Lab2/IPAM.md
    delegate_to: localhost
    register: v6
    changed_when: false

  - name: Get interface
    ansible.builtin.shell: |
      awk -F'|' '/{{ inventory_hostname }}/&&/{{ neighbor }}/{gsub(/ /,"",$3); sub(/^e/,"",$3); print $3; exit}' /root/github/Network-labs/Lab2/IPAM.md
    delegate_to: localhost
    register: intf
    changed_when: false

  - name: Get NET
    ansible.builtin.shell: |
      awk -F'|' '/EDGE-SARATOV/{gsub(/ /,"",$3); print $3; exit}' /root/github/Network-labs/Lab2/routing-register.md
    delegate_to: localhost
    register: net
    changed_when: false

  - name: Set facts
    ansible.builtin.set_fact:
      timestamp: "{{ ts.stdout | trim }}"
      ipv4_first: "{{ v4.stdout | trim }}" #need to convert
      IPv6: "{{ v6.stdout | trim }}"
      interface: "{{ intf.stdout | trim }}"
      NET: "{{ net.stdout | trim }}"

  - name: Build IPv4 for Huawei #convert var ipv4
    ansible.builtin.set_fact:
      IPv4: "{{ ipv4_first | ansible.utils.ipaddr('address') }} {{ ipv4_first | ansible.utils.ipaddr('netmask') }}"

  - name: Validate all vars
    ansible.builtin.assert:
      that:
        - IPv4 | length > 0
        - IPv4 != 'False False'
        - IPv6 | length > 0
        - interface | length > 0
        - NET | length > 0
      fail_msg: "EMPTY or BROKEN variable! Check files and filters."
      success_msg: "All variables OK"
  - name: debug_var
    ansible.builtin.debug:
      msg:
        - "IPv4: {{IPv4}}"
        - "IPv6: {{IPv6}}"
        - "NET: {{NET}}"

  tasks:
    - name: create_backup
      ansible.netcommon.cli_command:
        command: save backup.cfg
        prompt: "Are you sure to continue?"
        answer: "y"
    - name: add  NET
      ansible.netcommon.cli_command:
        command: |
          system-view
          isis 1
          network-entity {{NET}}
          is-level level-2
          commit
          quit
    - name: set IPv6
      ansible.netcommon.cli_command:
        command: |
          system-view
          interface Ethernet {{interface}}
          undo shutdown
          ipv6 enable
          ipv6 add {{IPv6}}
          isis enable 1
          commit
          quit

    - name: enable p2p isis
      ansible.netcommon.cli_command:
        command: |
          system-view
          interface Ethernet {{interface}}
          isis circuit-type p
          quit

    - name: Add IPv4
      ansible.netcommon.cli_command:
        command: |
          system-view
          interface Ethernet {{interface}}
          ip add {{IPv4}}
          quit

    - name: print difference
      ansible.netcommon.cli_command:
        command: "display current-configuration interface Ethernet {{interface}}"
      register: diff_output

    - name: print that was changed
      ansible.builtin.debug:
        msg: "{{diff_output.stdout_lines}}"

    - name: ask to me
      ansible.builtin.pause:
        prompt: "Commit?(yes/no)"
      register: answer

    - name: commit if yes
      ansible.netcommon.cli_command:
        command: |
          system-view
          commit
          return
          save vrpcfg.cfg
          y
          y
      when: answer.user_input | lower == "yes" #alwyas yes, not YeS, YES etc.

    - name: clear conf if no
      ansible.netcommon.cli_command:
        command: "clear configuration candidate"
      when: answer.user_input | lower != "yes"
      ignore_errors: yes #insurance if someone breaked
