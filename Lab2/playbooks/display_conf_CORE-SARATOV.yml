---
- name: Gathering full display configuration
  hosts: CORE-SARATOV
  gather_facts: false #always!
  vars:
    timestamp: "{{lookup('pipe','date +%Y-%m-%d_%H:%M:%S')}}"

  tasks:
    - name: Gathering
      ecorouter.ecorouteros.ecorouteros_fact:
        gather_subset:
          - config
      register: output

    - name: save to file
      ansible.builtin.copy:
        content: "{{output.stdout[0]}}" # ios_command return json with \n instead of whitespace 
        dest: "/root/github/Network-labs/Lab2/playbooks/sh-run/{{inventory_hostname}}_{{timestamp}}_config_.txt"
      delegate_to: localhost
