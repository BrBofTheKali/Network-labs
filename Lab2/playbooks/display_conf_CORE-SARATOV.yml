---
- name: Gathering full display configuration
  hosts: huaweiEDGE
  gather_facts: false #always!
  vars:
    timestamp: "{{lookup('pipe','date +%Y-%m-%d_%H:%M:%S')}}"
  tasks:

    - name: Gathering
      ansible.ios.ios_command:
        commands:
          - terminal length 0
          - show running-config
      register: output

    - name: wait 20 seconds # vendor said that it can be usefull(long auth on ecorouter)
      ansible.builtin.pause:
        seconds: 20

    - name: save to file
      ansible.builtin.copy:
        content: "{{output.stdout}}" 
        dest: "/root/github/Network-labs/Lab2/playbooks/sh-run/{{inventory_hostname}}_{{timestamp}}_config_.txt"
      delegate_to: localhost